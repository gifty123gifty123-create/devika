<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elysea - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Video Background -->
<video autoplay loop muted playsinline class="back-video">
    <source src="atheraorg.mp4" type="video/mp4">
</video>

<!-- ============ HEADER ============ -->
<header class="header">
    <nav class="navbar">
        <a href="index.html">Home</a>
        <a href="product.html">Product</a>
        <a href="about.html">About</a>
        <a href="login.html">Login</a>
    </nav>
</header>

<!-- ============ LOGIN FORM ============ -->
<div class="wrapper">
    <form action="">
        <h1>Elysea</h1>
        
        <!-- Username Input -->
        <div class="input-box">
            <input type="text" placeholder="Username" required>
            <i class='bx bxs-user'></i>
        </div>
        
        <!-- Password Input -->
        <div class="input-box">
            <input type="password" placeholder="Password" required>
            <i class='bx bxs-lock-alt'></i>
        </div>

        <!-- Remember & Forgot -->
        <div class="remember-forgot">
            <label><input type="checkbox"> Remember me</label>
            <a href="#">Forgot password?</a>
        </div>

        <!-- Login Button -->
        <button type="submit" class="btn">Login</button>

        <!-- Register Link -->
        <div class="register-link">
            <p>Don't have an account? <a href="#">Register</a></p>
        </div>
    </form>
</div>

</body>
</html>
