<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elysea - Products</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

<style>

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Cormorant Garamond', serif;
    min-height: 100vh;
    background: #0a0a0a;
    overflow-x: hidden;
}

/* LOGO */
.logo {
    position: fixed;
    top: 20px;
    left: 30px;
    z-index: 1000;
}

.logo img {
    height: 60px;
}

/* ============ IMAGE BACKGROUND ============ */
.back-image {
    position: fixed;
    top: 0;
    left: 0;
    z-index: -1;
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: brightness(0.5);
}

/* ============ FALLBACK BACKGROUND ============ */
.bg-fallback {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -2;
    background: 
        radial-gradient(ellipse at 20% 20%, rgba(183, 110, 121, 0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(223, 190, 159, 0.1) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 50%, rgba(247, 202, 201, 0.05) 0%, transparent 70%),
        linear-gradient(135deg, #1a1a2e 0%, #16213e 25%, #1a1a2e 50%, #2d1f3d 75%, #1a1a2e 100%);
}

/* ============ FLOATING PARTICLES ============ */
.particles {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -1;
    pointer-events: none;
    background-image: 
        radial-gradient(2px 2px at 100px 50px, rgba(247,202,201,0.4), transparent),
        radial-gradient(2px 2px at 200px 150px, rgba(183,110,121,0.3), transparent),
        radial-gradient(3px 3px at 300px 250px, rgba(223,190,159,0.4), transparent),
        radial-gradient(2px 2px at 400px 100px, rgba(247,202,201,0.3), transparent),
        radial-gradient(2px 2px at 500px 300px, rgba(183,110,121,0.4), transparent),
        radial-gradient(3px 3px at 150px 350px, rgba(247,202,201,0.3), transparent),
        radial-gradient(2px 2px at 350px 50px, rgba(223,190,159,0.3), transparent),
        radial-gradient(2px 2px at 50px 200px, rgba(183,110,121,0.4), transparent);
    background-size: 550px 400px;
    animation: floatParticles 20s linear infinite;
}

@keyframes floatParticles {
    0% { transform: translateY(0); }
    100% { transform: translateY(-400px); }
}

/* ============ PRODUCTS GRID ============ */
.products {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 40px;
    padding: 50px 70px;
    position: relative;
    z-index: 10;
}

/* ============ PRODUCT CARD - GLASSMORPHISM ============ */
.card {
    border-radius: 25px;
    overflow: hidden;
    position: relative;
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(183, 110, 121, 0.35);
    box-shadow: 
        0 8px 32px rgba(0, 0, 0, 0.4),
        inset 0 1px 0 rgba(255, 255, 255, 0.1),
        inset 0 -1px 0 rgba(0, 0, 0, 0.1);
    transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
}

.card::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(
        90deg,
        transparent,
        rgba(247, 202, 201, 0.1),
        transparent
    );
    transition: 0.6s;
    z-index: 1;
    pointer-events: none;
}

.card:hover::before {
    left: 100%;
}

.card:hover {
    transform: translateY(-15px) scale(1.03);
    border-color: rgba(183, 110, 121, 0.7);
    box-shadow: 
        0 20px 50px rgba(0, 0, 0, 0.5),
        0 0 40px rgba(183, 110, 121, 0.3),
        inset 0 1px 0 rgba(255, 255, 255, 0.2);
}

.discount {
    position: absolute;
    top: 18px;
    left: 18px;
    z-index: 5;
    padding: 10px 18px;
    border-radius: 25px;
    background: rgba(183, 110, 121, 0.25);
    backdrop-filter: blur(15px);
    border: 1px solid rgba(183, 110, 121, 0.5);
    font-family: 'Cinzel', serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    color: #f7cac9;
}

.wishlist {
    position: absolute;
    top: 18px;
    right: 18px;
    z-index: 5;
    width: 45px;
    height: 45px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(15px);
    border: 1px solid rgba(183, 110, 121, 0.4);
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    transition: 0.4s ease;
}

.wishlist i {
    font-size: 20px;
    color: #f7cac9;
}

.image-container {
    overflow: hidden;
}

.card img {
    width: 100%;
    height: 280px;
    object-fit: cover;
    transition: 0.5s ease;
}

.card:hover img {
    transform: scale(1.1);
}

.cart-bar {
    margin: 18px;
    border-radius: 35px;
    padding: 14px 25px;
    text-align: center;
    cursor: pointer;
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(15px);
    border: 1px solid rgba(183, 110, 121, 0.5);
    font-family: 'Cinzel', serif;
    font-size: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #f7cac9;
}

.info {
    padding: 8px 22px 25px;
}

.title {
    font-family: 'Cinzel', serif;
    font-size: 22px;
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 10px;
    background: linear-gradient(to right, #b76e79, #f7cac9, #dfbe9f, #b76e79);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.price {
    font-size: 18px;
    color: rgba(247, 202, 201, 0.9);
}

.price span {
    text-decoration: line-through;
    opacity: 0.5;
}

</style>
</head>

<body>

<div class="logo">
<img src="logo.png" alt="logo">
</div>

<img src="hie.jpg" class="back-image" alt="Background">

<div class="bg-fallback"></div>

<div class="particles"></div>

<div class="products">

<div class="card">
<div class="discount">20% OFF</div>

<div class="card">

<div class="wishlist"><i class='bx bx-heart'></i></div>
<div class="image-container">

</div>

</body>
</html>
